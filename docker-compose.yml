services:
  app:
    image: ghcr.io/simonkell/stadiumtracker:latest
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/stadiumtracker.db
      SQLITE_DB_PATH: /app/data/stadiumtracker.db
    volumes:
      - stadiumtracker_data:/app/data
    labels:
      arcane.stack.auto-update: "true"
    restart: unless-stopped

volumes:
  stadiumtracker_data:
